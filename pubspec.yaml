name: first_light
description: Murmuration — turn real-world birding into trading cards.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  go_router: ^13.2.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
